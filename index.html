<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Astral — Carta Natal</title>
<style>
  :root{
    color-scheme: dark;
    --bg:#0B1030; --bg2:#0E1436; --card:#131A3E; --field:#1A2148; --border:#2A335F;
    --ink:#E8ECF8; --muted:#AEB6D6; --faint:#6E77A0;
    --gold:#C9A24B; --gold-lt:#D8B25E; --blue:#3A4488; --silver:#AEB6D6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;}
  header{background:linear-gradient(90deg,#0B1030,#1A2350);color:#fff;
    padding:24px 16px;text-align:center;border-bottom:1px solid #222c58;}
  header h1{margin:0;font-size:25px;letter-spacing:1px;color:var(--gold);font-weight:700}
  header p{margin:5px 0 0;color:var(--silver);font-size:13px;letter-spacing:.5px}
  .wrap{max-width:960px;margin:0 auto;padding:16px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:16px 18px;margin:14px 0;}
  h2{font-size:14px;color:var(--gold);margin:0 0 12px;letter-spacing:.5px;
    text-transform:uppercase;font-weight:600}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 3px}
  input,select{width:100%;background:var(--field);border:1px solid var(--border);
    border-radius:8px;padding:9px 10px;color:var(--ink);font-size:14px;font-family:inherit}
  input::placeholder{color:var(--faint)}
  input:focus,select:focus{outline:none;border-color:var(--gold)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .row{display:flex;gap:8px;align-items:flex-end}
  button{background:var(--gold);color:#0B1030;border:none;border-radius:10px;
    padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  button:hover{background:var(--gold-lt)}
  button:disabled{opacity:.5;cursor:default}
  button.sec{background:transparent;color:var(--gold);border:1px solid var(--border);
    padding:9px 12px;font-weight:600}
  button.sec:hover{border-color:var(--gold)}
  .full{width:100%}
  .status{font-size:13px;color:var(--muted);min-height:18px;margin-top:8px}
  .err{color:#E06A6A}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:12px}
  .hidden{display:none}
  .apibar{font-size:12px;color:var(--faint);margin-top:10px;word-break:break-all}
  #wheelWrap{display:flex;justify-content:center}
  svg{max-width:100%;height:auto}
  .foot{font-size:11px;color:var(--faint);text-align:center;padding:16px}
  .two{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
  .dlbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .dlbar span{color:var(--muted);font-size:13px}
  .icn{width:15px;height:15px;vertical-align:-3px;background:#E9EDF7;
    border-radius:3px;padding:1px}
  .icn.sm{width:13px;height:13px}
  @media(max-width:760px){.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>✦ REPORTE ASTRAL</h1>
  <p>Carta natal · cálculo con Swiss Ephemeris</p>
</header>

<div class="wrap">
  <div class="card">
    <h2>Datos de nacimiento</h2>
    <div class="grid">
      <div><label>Nombre (opcional)</label><input id="name" placeholder="Ej: María"></div>
      <div><label>Zona horaria (IANA)</label>
        <input id="tz" list="tzlist" value="America/Santiago" placeholder="America/Santiago">
        <datalist id="tzlist">
          <option>America/Santiago</option><option>America/Argentina/Buenos_Aires</option>
          <option>America/Lima</option><option>America/Bogota</option><option>America/Mexico_City</option>
          <option>Europe/Madrid</option><option>America/New_York</option><option>UTC</option>
        </datalist>
      </div>
    </div>
    <div class="grid" style="margin-top:10px">
      <div><label>Fecha de nacimiento</label><input id="date" type="date"></div>
      <div><label>Hora (24 h)</label><input id="time" type="time" value="12:00"></div>
    </div>
    <div style="margin-top:10px">
      <label>Ciudad (busca latitud/longitud)</label>
      <div class="row">
        <input id="city" placeholder="Ej: Temuco, Chile">
        <button class="sec" id="btnCity" type="button">🔍 Buscar</button>
      </div>
    </div>
    <div class="grid3" style="margin-top:10px">
      <div><label>Latitud</label><input id="lat" placeholder="-38.7333"></div>
      <div><label>Longitud</label><input id="lon" placeholder="-72.6"></div>
      <div style="display:flex;align-items:flex-end">
        <button class="full" id="btnCalc" type="button">✦ Calcular carta</button>
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="sec" id="btnHoy" type="button">🕐 Carta de este momento</button>
      <button class="sec" id="btnSave" type="button">💾 Guardar carta</button>
      <select id="savedSel" style="flex:1"><option value="">— cartas guardadas —</option></select>
      <button class="sec" id="btnDel" type="button" title="Eliminar la carta seleccionada">🗑</button>
    </div>
    <div class="status" id="status"></div>
    <div class="apibar">API: <span id="apiUrl"></span></div>
  </div>

  <div id="result" class="hidden">
    <div class="card dlbar">
      <span>Descargar reporte completo con interpretaciones:</span>
      <button id="btnPdf" type="button">⬇ PDF</button>
      <button class="sec" id="btnDocx" type="button">⬇ Word (.docx)</button>
      <span id="dlStatus" style="color:var(--faint)"></span>
    </div>
    <div class="two">
      <div class="card">
        <h2 id="wheelTitle">Carta natal</h2>
        <div id="wheelWrap"></div>
      </div>
      <div class="card">
        <h2>Posiciones</h2>
        <div id="angles" style="font-size:13px;color:var(--muted);margin-bottom:8px"></div>
        <table><thead><tr><th></th><th>Planeta</th><th>Signo</th><th>Grado</th><th>Casa</th></tr></thead>
        <tbody id="tbody"></tbody></table>
      </div>
    </div>
    <div class="card">
      <h2>Aspectos</h2>
      <div id="aspects" style="font-size:13px;line-height:2.1"></div>
    </div>
    <div class="card">
      <h2>Leyenda de símbolos</h2>
      <div id="legend" style="font-size:12.5px;line-height:2.2"></div>
    </div>
  </div>
</div>

<div class="foot">Reporte Astral · cálculo con Swiss Ephemeris</div>

function getInput(){
  const date=$("date").value.trim(), time=$("time").value.trim()||"12:00";
  const lat=parseFloat($("lat").value), lon=parseFloat($("lon").value);
  const tz=$("tz").value.trim(), name=$("name").value.trim();
  return {date,time,lat,lon,tz,name};
}

async function buscarCiudad(){
  const q = $("city").value.trim();
  if(!q){ setStatus("Escribe una ciudad."); return; }
  setStatus("Buscando ciudad…");
  try{
    const r = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q),
      {headers:{"Accept":"application/json"}});
    const arr = await r.json();
    if(!arr.length){ setStatus("No se encontró la ciudad. Puedes escribir la latitud y longitud a mano.", true); return; }
    $("lat").value = parseFloat(arr[0].lat).toFixed(4);
    $("lon").value = parseFloat(arr[0].lon).toFixed(4);
    setStatus("Ubicación: "+arr[0].display_name);
  }catch(e){ setStatus("No se pudo buscar la ciudad. Escribe la latitud y longitud a mano.", true); }
}

async function calcular(){
  const inp = getInput();
  if(!inp.date){ setStatus("Completa la fecha (AAAA-MM-DD).", true); return; }
  if(isNaN(inp.lat)||isNaN(inp.lon)){ setStatus("Completa la latitud y la longitud (o busca la ciudad).", true); return; }
  setStatus("Calculando… (si el servidor estaba en reposo, la primera vez puede tardar ~50 s)");
  try{
    const r = await fetch(API_URL+"/api/natal",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({date:inp.date,time:inp.time,lat:inp.lat,lon:inp.lon,tz:inp.tz})});
    if(!r.ok){ setStatus("Error del servidor: "+(await r.text()), true); return; }
    const data = await r.json();
    lastInput = inp; lastData = data;
    render(data);
    setStatus("Carta calculada. Desfase UTC aplicado: "+data.input.utc_offset_hours+" h");
  }catch(e){ setStatus("No se pudo conectar con la API: "+e.message, true); }
}

function render(data){
  $("result").classList.remove("hidden");
  const nm = $("name").value.trim();
  $("wheelTitle").textContent = nm ? ("Carta natal · "+nm) : "Carta natal";
  const tb=$("tbody"); tb.innerHTML="";
  data.planets.forEach(p=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${icn(p.key)}</td><td>${p.name}</td>
      <td>${icn(SIGN_KEYS[p.sign_index-1],"sm")} ${p.sign_es||p.sign}</td>
      <td>${p.deg}°${String(p.min).padStart(2,"0")}'${p.retrograde?" ℞":""}</td>
      <td>${p.house}</td>`;
    tb.appendChild(tr);
  });
  const ascIdx=(lonSignIdx(data.angles.asc.lon)), mcIdx=(lonSignIdx(data.angles.mc.lon));
  $("angles").innerHTML =
    `<b style="color:var(--gold)">Asc</b> ${icn(SIGN_KEYS[ascIdx],"sm")} ${data.angles.asc.deg}° ${data.angles.asc.sign_es||data.angles.asc.sign}
     &nbsp;·&nbsp; <b style="color:var(--gold)">MC</b> ${icn(SIGN_KEYS[mcIdx],"sm")} ${data.angles.mc.deg}° ${data.angles.mc.sign_es||data.angles.mc.sign}`;
  const ASPECT_TXT = {Conjunction:"#C9A24B",Sextile:"#5FC9A0",Square:"#E0925A",
    Trine:"#5FA8E0",Opposition:"#E06A6A"};
  $("aspects").innerHTML = data.aspects.map(a=>{
    const c=ASPECT_TXT[a.type]||"#888";
    return `<span style="white-space:nowrap">${icn(a.a,"sm")} <span style="color:${c}">${a.type_es}</span> ${icn(a.b,"sm")}
      <span style="color:var(--faint)">(${a.orb}°)</span></span>`;
  }).join(" &nbsp; ") || "—";
  drawWheel(data);
}
function lonSignIdx(lon){ return Math.floor((((lon%360)+360)%360)/30); }

// ── Rueda estilo clásico con los íconos propios ─────────────────────────
// theme "dark": pantalla (fondo azul noche, chips claros bajo los íconos)
// theme "light": para el reporte (fondo blanco, trazos oscuros)
function buildWheelSVG(data, theme){
  const dark = theme==="dark";
  const LINE = dark ? "#6E78A8" : "#1A1A29";
  const LINE2= dark ? "#4A5590" : "#1A1A29";
  const TXT  = dark ? "#C7CDE8" : "#000000";
  const TXT2 = dark ? "#AEB6D6" : "#000000";
  const RCOL = dark ? "#FF7070" : "#CC0000";
  const ASP  = dark
    ? {Opposition:"#E06060",Trine:"#6FA0FF",Square:"#D8DCEF",Sextile:"#58C98A"}
    : {Opposition:"#CC0000",Trine:"#0000CC",Square:"#000000",Sextile:"#00990A"};
  const S=500, C=250, asc=data.angles.asc.lon;
  const ang = lon => (180 + asc - lon) * Math.PI/180;
  const pt = (lon,r) => [C + r*Math.cos(ang(lon)), C + r*Math.sin(ang(lon))];
  const img = (key,lon,r,size,chip)=>{
    const [x,y]=pt(lon,r);
    let o="";
    if(chip) o+=`<circle cx="${x}" cy="${y}" r="${size*0.72}" fill="#E9EDF7" opacity="0.95"/>`;
    if(ICONS[key]) o+=`<image x="${x-size/2}" y="${y-size/2}" width="${size}" height="${size}" href="${ICONS[key]}" xlink:href="${ICONS[key]}"/>`;
    return o;
  };
  let s = `<svg id="wheelSvg" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">`;
  s += `<rect width="${S}" height="${S}" fill="${dark?'#0C1233':'#FFFFFF'}"/>`;
  [200,180,160,80,70].forEach(r=>{
    s+=`<circle cx="${C}" cy="${C}" r="${r}" fill="none" stroke="${LINE}" stroke-width="1"/>`;
  });
  for(let i=0;i<12;i++){
    const l=i*30;
    let [x1,y1]=pt(l,160),[x2,y2]=pt(l,200);
    s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${LINE}" stroke-width="1"/>`;
    for(const d of [10,20]){
      const [a1,b1]=pt(l+d,180),[a2,b2]=pt(l+d,200);
      s+=`<line x1="${a1}" y1="${b1}" x2="${a2}" y2="${b2}" stroke="${LINE}" stroke-width="0.6"/>`;
    }
    s += img(SIGN_KEYS[i], l+15, 170, 17, dark);
    DECAN_RULERS[i].forEach((rk,d)=>{ s += img(rk, l+5+d*10, 190, 10, dark); });
  }
  data.houses.forEach(h=>{
    const [x1,y1]=pt(h.lon,80),[x2,y2]=pt(h.lon,160);
    const axis=(h.num===1||h.num===10||h.num===4||h.num===7);
    s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${axis?LINE:LINE2}" stroke-width="${axis?1.5:0.8}"/>`;
    const [nx,ny]=pt(h.lon+5,75);
    s+=`<text x="${nx}" y="${ny}" font-size="8" fill="${TXT}" text-anchor="middle" dominant-baseline="central">${h.num}</text>`;
  });
  const pos={}; data.planets.forEach(p=>pos[p.key]=p.lon);
  data.aspects.forEach(a=>{
    if(pos[a.a]==null||pos[a.b]==null||a.type==="Conjunction") return;
    const [x1,y1]=pt(pos[a.a],70),[x2,y2]=pt(pos[a.b],70);
    s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${ASP[a.type]||'#666'}" stroke-width="1"/>`;
  });
  const lons = data.planets.map(p=>p.lon);
  const shown = adjustAngles(lons, 7.5);
  data.planets.forEach((p,i)=>{
    const a = shown[i];
    s += img(p.key, a, 142, 19, dark);
    const [dx,dy]=pt(a,123);
    s+=`<text x="${dx}" y="${dy}" font-size="7.5" fill="${TXT}" text-anchor="middle" dominant-baseline="central">${p.deg}°</text>`;
    s += img(SIGN_KEYS[p.sign_index-1], a, 110, 12, dark);
    const [mx,my]=pt(a,98);
    s+=`<text x="${mx}" y="${my}" font-size="7" fill="${TXT2}" text-anchor="middle" dominant-baseline="central">${String(p.min).padStart(2,"0")}'</text>`;
    if(p.retrograde){
      const [rx,ry]=pt(a,87);
      s+=`<text x="${rx}" y="${ry}" font-size="7" fill="${RCOL}" text-anchor="middle" dominant-baseline="central">R</text>`;
    }
  });
  const putLbl=(t,l)=>{const [x,y]=pt(l,207);
    s+=`<text x="${x}" y="${y}" font-size="11" font-weight="bold" fill="${dark?'#C9A24B':'#000'}" text-anchor="middle" dominant-baseline="central">${t}</text>`;};
  putLbl("Ac",asc); putLbl("Mc",data.angles.mc.lon);
  s+=`</svg>`;
  return s;
}

function adjustAngles(lons, minSep){
  const idx = lons.map((l,i)=>[l,i]).sort((a,b)=>a[0]-b[0]);
  const adj = idx.map(x=>x[0]);
  for(let pass=0; pass<40; pass++){
    let moved=false;
    for(let i=0;i<adj.length;i++){
      const j=(i+1)%adj.length;
      let gap = adj[j]-adj[i]; if(j===0) gap+=360;
      if(gap < minSep){
        const push=(minSep-gap)/2;
        adj[i]-=push; adj[j]+=push;
        if(j===0) adj[j]-=360;
        moved=true;
      }
    }
    if(!moved) break;
  }
  const out = new Array(lons.length);
  idx.forEach((x,k)=>{ out[x[1]] = ((adj[k]%360)+360)%360; });
  return out;
}

function drawWheel(data){
  $("wheelWrap").innerHTML = buildWheelSVG(data, "dark");
}

// La imagen para el reporte se genera SIEMPRE en tema claro (fondo blanco)
function wheelToPng(size){
  return new Promise((resolve)=>{
    if(!lastData){ resolve(null); return; }
    const xml = buildWheelSVG(lastData, "light");
    const src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));
    const img = new Image();
    img.onload = ()=>{
      const cv=document.createElement("canvas"); cv.width=size; cv.height=size;
      const ctx=cv.getContext("2d");
      ctx.fillStyle="#FFFFFF"; ctx.fillRect(0,0,size,size);
      ctx.drawImage(img,0,0,size,size);
      resolve(cv.toDataURL("image/png"));
    };
    img.onerror = ()=>resolve(null);
    img.src = src;
  });
}

async function descargar(fmt){
  if(!lastInput){ return; }
  const dl=$("dlStatus");
  $("btnPdf").disabled=true; $("btnDocx").disabled=true;
  dl.textContent="Generando… (puede tardar unos segundos)";
  try{
    const png = await wheelToPng(900);
    const body = Object.assign({}, lastInput, {format:fmt, chart_png:png});
    const r = await fetch(API_URL+"/api/report",{method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    if(!r.ok){ dl.textContent="Error: "+(await r.text()); return; }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const nm = (lastInput.name||"Reporte_Astral").replace(/\s+/g,"_");
    const a = document.createElement("a");
    a.href=url; a.download = nm + (fmt==="docx"?".docx":".pdf");
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    dl.textContent="Descargado ✓";
  }catch(e){ dl.textContent="No se pudo generar: "+e.message; }
  finally{ $("btnPdf").disabled=false; $("btnDocx").disabled=false; }
}

// ── Leyenda de símbolos ─────────────────────────────────────────────────
const LEGEND_PLANETS=[["aSol","Sol"],["aLuna","Luna"],["aMercurio","Mercurio"],
 ["aVenus","Venus"],["aTierra","Tierra"],["aMarte","Marte"],["aJupiter","Júpiter"],
 ["aSaturno","Saturno"],["aChiron","Quirón"],["aUrano","Urano"],["aNeptuno","Neptuno"],
 ["aPluton","Plutón"],["aNoduloNorte","Nodo Norte"],["aNoduloSur","Nodo Sur"],
 ["aLunaNegra","Luna Negra"],["aRuedaFortuna","R. Fortuna"]];
const LEGEND_SIGNS=[["Aries","Aries"],["Taurus","Tauro"],["Gemini","Géminis"],
 ["Cancer","Cáncer"],["Leo","Leo"],["Virgo","Virgo"],["Libra","Libra"],
 ["Scorpio","Escorpio"],["Sagittarius","Sagitario"],["Capricorn","Capricornio"],
 ["Aquarius","Acuario"],["Pisces","Piscis"]];
function renderLegend(){
  const mk=arr=>arr.map(([k,n])=>`<span style="white-space:nowrap;margin-right:14px">${icn(k,"sm")} ${n}</span>`).join(" ");
  $("legend").innerHTML =
    `<div style="color:var(--gold);font-size:12px;margin-bottom:4px">Planetas y puntos</div>${mk(LEGEND_PLANETS)}
     <div style="color:var(--gold);font-size:12px;margin:10px 0 4px">Signos</div>${mk(LEGEND_SIGNS)}`;
}
renderLegend();

// ── Cartas guardadas (en este navegador) ────────────────────────────────
const LS_KEY="ra_cartas";
function loadSaved(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function refreshSavedSel(){
  const sel=$("savedSel"), saved=loadSaved();
  sel.innerHTML='<option value="">— cartas guardadas —</option>';
  Object.keys(saved).sort().forEach(k=>{
    const o=document.createElement("option"); o.value=k; o.textContent=k; sel.appendChild(o);
  });
}
function guardarCarta(){
  const inp=getInput();
  if(!inp.date||isNaN(inp.lat)){ setStatus("Completa los datos antes de guardar.", true); return; }
  const nombre = inp.name || ("Carta "+inp.date);
  const saved=loadSaved(); saved[nombre]=inp;
  localStorage.setItem(LS_KEY, JSON.stringify(saved));
  refreshSavedSel(); $("savedSel").value=nombre;
  setStatus(`Carta «${nombre}» guardada en este navegador.`);
}
function cargarCarta(nombre){
  const c=loadSaved()[nombre]; if(!c) return;
  $("name").value=c.name||""; $("date").value=c.date||""; $("time").value=c.time||"12:00";
  $("lat").value=c.lat; $("lon").value=c.lon; $("tz").value=c.tz||"";
  setStatus(`Carta «${nombre}» cargada. Presiona «Calcular carta».`);
}
function eliminarCarta(){
  const sel=$("savedSel"); if(!sel.value) return;
  const saved=loadSaved(); delete saved[sel.value];
  localStorage.setItem(LS_KEY, JSON.stringify(saved));
  refreshSavedSel(); setStatus("Carta eliminada.");
}
refreshSavedSel();

// ── Carta de este momento ───────────────────────────────────────────────
function cartaDeHoy(){
  const now=new Date();
  const p=n=>String(n).padStart(2,"0");
  $("date").value = now.getFullYear()+"-"+p(now.getMonth()+1)+"-"+p(now.getDate());
  $("time").value = p(now.getHours())+":"+p(now.getMinutes());
  if(!isNaN(parseFloat($("lat").value)) && !isNaN(parseFloat($("lon").value))){
    calcular();
  }else{
    setStatus("Fecha y hora actuales listas. Busca la ciudad y presiona «Calcular carta».");
  }
}

$("btnCity").addEventListener("click",buscarCiudad);
$("btnCalc").addEventListener("click",calcular);
$("btnPdf").addEventListener("click",()=>descargar("pdf"));
$("btnDocx").addEventListener("click",()=>descargar("docx"));
$("btnHoy").addEventListener("click",cartaDeHoy);
$("btnSave").addEventListener("click",guardarCarta);
$("btnDel").addEventListener("click",eliminarCarta);
$("savedSel").addEventListener("change",e=>{ if(e.target.value) cargarCarta(e.target.value); });
$("city").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();buscarCiudad();}});
</script>
